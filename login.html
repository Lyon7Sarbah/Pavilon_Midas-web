<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Pavilon Midas Ltd</title>
  
  <!-- Security Headers -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; font-src 'self' https://cdnjs.cloudflare.com https://fonts.gstatic.com; img-src 'self' data:;">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* Previous styles remain same */
    .auth-page {
      position: relative;
      background-image: url('assets/login-bg.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
    
    .auth-page::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, rgba(8, 15, 34, 0.85) 0%, rgba(13, 27, 62, 0.75) 100%);
      z-index: 0;
    }
    
    .auth-page .auth-card {
      position: relative;
      z-index: 1;
      backdrop-filter: blur(10px);
      background: rgba(255, 255, 255, 0.95);
    }
    
    .password-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      color: var(--gray-500);
      padding: 4px;
      transition: var(--transition);
    }
    
    .password-toggle:hover {
      color: var(--gold);
    }
    
    /* Rate limit indicator */
    .login-attempts {
      font-size: 0.75rem;
      color: var(--gray-500);
      margin-top: 8px;
      text-align: center;
    }
    
    /* 2FA input styling */
    .otp-input {
      letter-spacing: 8px;
      font-size: 1.5rem;
      text-align: center;
      font-weight: 600;
    }
  </style>
</head>
<body>

<nav class="navbar">
  <!-- Navigation same as before -->
</nav>

<div class="auth-page">
  <div class="auth-card fade-in visible">
    <div class="auth-logo">
      <img src="assets/logo1.png" alt="Pavilon Midas" onerror="this.style.display='none'">
      <!--<div style="font-family:var(--font-display);font-size:0.75rem;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-top:6px;">Asset Management Ltd</div>-->
    </div>
    
    <h2 class="auth-title">Secure Login</h2>
    <p class="auth-subtitle">Your security is our priority. All data is encrypted.</p>

    <!-- CSRF Token (would be generated server-side) -->
    <input type="hidden" id="csrf_token" name="csrf_token" value="">
    
    <!-- Honeypot field for bot protection -->
    <input type="text" name="website" style="display:none;" autocomplete="off">

    <form action="auth/login.php" method="post" id="loginForm" autocomplete="on">
      <div class="form-group">
        <label class="form-label" for="email">
          <i class="fas fa-envelope" style="margin-right: 6px; color: var(--gold); font-size: 0.9rem;"></i>
          Email Address
        </label>
        <input type="email" 
               id="email" 
               name="email" 
               class="form-control" 
               placeholder="you@example.com" 
               required 
               autocomplete="email"
               maxlength="100"
               pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"
               title="Please enter a valid email address">
      </div>
      
      <div class="form-group">
        <label class="form-label" for="loginPassword" style="display:flex;justify-content:space-between;align-items:center;">
          <span>
            <i class="fas fa-lock" style="margin-right: 6px; color: var(--gold); font-size: 0.9rem;"></i>
            Password
          </span>
          <a href="forgot-password.html" style="font-weight:400;color:var(--gold);font-size:0.82rem;">
            <i class="fas fa-key" style="margin-right: 4px;"></i>Forgot?
          </a>
        </label>
        <div style="position:relative;">
          <input type="password" 
                 class="form-control" 
                 id="loginPassword" 
                 name="password" 
                 placeholder="••••••••" 
                 required 
                 autocomplete="current-password"
                 minlength="8"
                 maxlength="128">
          <button type="button" onclick="togglePassword('loginPassword', this)" class="password-toggle">
            <i class="fas fa-eye"></i>
          </button>
        </div>
      </div>
      
      <!-- 2FA Section (shown if enabled for account) -->
      <div id="otpSection" style="display:none;" class="form-group">
        <label class="form-label" for="otpCode">
          <i class="fas fa-shield-alt" style="margin-right: 6px; color: var(--gold); font-size: 0.9rem;"></i>
          Two-Factor Authentication Code
        </label>
        <input type="text" 
               id="otpCode" 
               name="otp_code" 
               class="form-control otp-input" 
               placeholder="000000" 
               maxlength="6" 
               pattern="[0-9]{6}"
               inputmode="numeric"
               autocomplete="one-time-code">
        <small style="color: var(--gray-500); display: block; margin-top: 4px;">
          <i class="fas fa-info-circle"></i> Enter the 6-digit code from your authenticator app
        </small>
      </div>
      
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;">
        <div style="display:flex;align-items:center;gap:10px;">
          <input type="checkbox" 
                 id="rememberMe" 
                 name="remember" 
                 style="accent-color:var(--gold);width:16px;height:16px;cursor:pointer;">
          <label for="rememberMe" style="font-size:0.88rem;color:var(--gray-700);cursor:pointer;">
            Remember this device
          </label>
        </div>
        <div>
          <i class="fas fa-shield" style="color: #2ecc71; font-size: 0.7rem;"></i>
          <span style="font-size:0.75rem;color:var(--gray-500);">Secured by SSL/TLS</span>
        </div>
      </div>
      
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;font-size:1rem;padding:16px;" id="loginButton">
        <i class="fas fa-sign-in-alt" style="margin-right: 8px;"></i>Secure Sign In
      </button>
      
      <div class="login-attempts">
        <i class="fas fa-history"></i> 
        <span id="attemptMessage">3 attempts remaining</span>
      </div>
    </form>

    <div class="auth-divider">or continue securely with</div>
    
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <button class="btn btn-outline-gold" style="justify-content:center;font-size:0.85rem;" onclick="handleTelegramLogin()">
        <i class="fab fa-telegram"></i> Telegram
      </button>
      <button class="btn social-btn" onclick="handleGoogleLogin()">
        <i class="fab fa-google"></i> Google
      </button>
    </div>

    <div class="auth-footer">
      Don't have an account? <a href="register.html">Create secure account <i class="fas fa-arrow-right" style="font-size: 0.8rem; margin-left: 4px;"></i></a>
    </div>
    
    <!-- Security Badges -->
    <div style="margin-top: 20px; display: flex; justify-content: center; gap: 16px; font-size: 0.7rem; color: var(--gray-500);">
      <span><i class="fas fa-lock" style="color: #2ecc71;"></i> 256-bit Encryption</span>
      <span><i class="fas fa-shield" style="color: #2ecc71;"></i> DDoS Protected</span>
      <span><i class="fas fa-clock" style="color: #2ecc71;"></i> 24/7 Monitoring</span>
    </div>
  </div>
</div>

<button class="scroll-top"><i class="fas fa-arrow-up"></i></button>

<script src="js/main.js"></script>
<script>
// Secure password toggle with accessibility
function togglePassword(id, btn) {
  const input = document.getElementById(id);
  const icon = btn.querySelector('i');
  
  if (input.type === 'password') {
    input.type = 'text';
    icon.classList.remove('fa-eye');
    icon.classList.add('fa-eye-slash');
  } else {
    input.type = 'password';
    icon.classList.remove('fa-eye-slash');
    icon.classList.add('fa-eye');
  }
}

// Generate and set CSRF token (would normally come from server)
function generateCSRFToken() {
  const token = Math.random().toString(36).substring(2) + Date.now().toString(36);
  document.getElementById('csrf_token').value = token;
  // Store in sessionStorage for validation
  sessionStorage.setItem('csrf_token', token);
}

// Rate limiting and login attempt tracking
let loginAttempts = 0;
const MAX_ATTEMPTS = 3;
let lockoutTimer = null;

document.getElementById('loginForm').addEventListener('submit', function(e) {
  // Check CSRF token
  const storedToken = sessionStorage.getItem('csrf_token');
  const formToken = document.getElementById('csrf_token').value;
  
  if (!storedToken || storedToken !== formToken) {
    e.preventDefault();
    alert('Security validation failed. Please refresh the page.');
    return false;
  }
  
  // Check for lockout
  if (sessionStorage.getItem('lockoutUntil')) {
    const lockoutUntil = parseInt(sessionStorage.getItem('lockoutUntil'));
    if (Date.now() < lockoutUntil) {
      e.preventDefault();
      const minutesLeft = Math.ceil((lockoutUntil - Date.now()) / 60000);
      alert(`Too many failed attempts. Please try again in ${minutesLeft} minutes.`);
      return false;
    }
  }
  
  // Disable button to prevent double submission
  const btn = document.getElementById('loginButton');
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verifying...';
  
  // Re-enable after 3 seconds (in case of network issues)
  setTimeout(() => {
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-sign-in-alt" style="margin-right: 8px;"></i>Secure Sign In';
  }, 3000);
});

// Secure OAuth handlers
function handleTelegramLogin() {
  // Implement secure Telegram OAuth
  const telegramAuthUrl = 'https://oauth.telegram.org/auth?bot_id=YOUR_BOT_ID&origin=' + encodeURIComponent(window.location.origin);
  window.location.href = telegramAuthUrl;
}

function handleGoogleLogin() {
  // Implement secure Google OAuth with state parameter
  const state = Math.random().toString(36).substring(7);
  sessionStorage.setItem('oauth_state', state);
  
  const googleAuthUrl = 'https://accounts.google.com/o/oauth2/v2/auth?' +
    'client_id=YOUR_CLIENT_ID' +
    '&redirect_uri=' + encodeURIComponent(window.location.origin + '/auth/google-callback.php') +
    '&response_type=code' +
    '&scope=email%20profile' +
    '&state=' + state;
  
  window.location.href = googleAuthUrl;
}

// Initialize security features
document.addEventListener('DOMContentLoaded', function() {
  generateCSRFToken();
  
  // Clear sensitive data from session when page unloads
  window.addEventListener('beforeunload', function() {
    // Don't clear CSRF token as it's needed for form submission
  });
  
  // Prevent form resubmission on page refresh
  if (window.history.replaceState) {
    window.history.replaceState(null, null, window.location.href);
  }
  
  // Animate card
  const authCard = document.querySelector('.auth-card');
  if (authCard) {
    authCard.style.opacity = '0';
    authCard.style.transform = 'translateY(20px)';
    
    setTimeout(() => {
      authCard.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
      authCard.style.opacity = '1';
      authCard.style.transform = 'translateY(0)';
    }, 100);
  }
});

// Clear session storage on successful login (would be called after successful auth)
function handleSuccessfulLogin() {
  sessionStorage.removeItem('csrf_token');
  sessionStorage.removeItem('lockoutUntil');
  loginAttempts = 0;
}
</script>

</body>
</html>
